name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sounglah_test
          POSTGRES_USER: sounglah_ci_user
          POSTGRES_PASSWORD: sounglah_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sounglah_ci_user -d sounglah_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      SECRET_KEY: test-secret-key
      JWT_SECRET_KEY: test-jwt-secret-key
      DATABASE_URL: postgresql+psycopg://sounglah_ci_user:sounglah_ci_password@localhost:5432/sounglah_test
      ADMIN_EMAIL: admin@sounglah.com
      ADMIN_PASSWORD: password
      FRONTEND_ORIGIN: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: flask db upgrade

      - name: Run backend tests
        run: pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.15.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
